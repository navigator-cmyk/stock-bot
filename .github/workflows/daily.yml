name: Daily Stock and News Update

on:
  schedule:
    # 日本時間 朝6:30 (UTC 21:30) に実行
    - cron: '30 21 * * *'
  workflow_dispatch: # 手動実行ボタンも出しておきます

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # v3 から v4 に変更

      - name: Set up Python
        uses: actions/setup-python@v5  # v4 から v5 に変更
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Stock Analysis
        run: python script.py  # 株価・グラフ生成

      - name: Run News Collection
        run: python news_collector.py  # ニュース収集

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          # 変更がある場合のみコミット
          git diff --quiet && git diff --staged --quiet || git commit -m "Update stock data, charts and news list"
          git push
